<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Scrawnload promotional image rig</title>
    <link rel="stylesheet" href="../popup.css" />
    <style>
      * { box-sizing: border-box; }
      html, body {
        margin: 0;
        width: 1280px;
        height: 800px;
        overflow: hidden;
        background: #ffffff;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }
      #stage {
        width: 1280px;
        height: 800px;
        display: flex;
        align-items: center;
      }
      #left {
        width: 480px;
        flex-shrink: 0;
        padding: 0 64px;
        display: flex;
        flex-direction: column;
        gap: 20px;
      }
      #brand {
        display: flex;
        align-items: center;
        gap: 14px;
      }
      #brand img { width: 64px; height: 64px; }
      #wordmark {
        font-family: ui-monospace, "SF Mono", "Cascadia Code", Menlo, Consolas, monospace;
        font-size: 38px;
        font-weight: 700;
        letter-spacing: -0.01em;
        color: #161616;
      }
      #tagline {
        font-family: ui-monospace, "SF Mono", "Cascadia Code", Menlo, Consolas, monospace;
        font-size: 16px;
        color: #585858;
      }
      #sub {
        font-size: 17px;
        line-height: 1.6;
        color: #161616;
        max-width: 32ch;
      }
      #right {
        flex: 1;
        display: flex;
        align-items: center;
        justify-content: center;
      }
      #popup-anchor {
        width: 420px;
        background: #ffffff;
        border-radius: 10px;
        box-shadow: 0 28px 80px rgba(0,0,0,0.18);
        overflow: hidden;
      }
    </style>
  </head>
  <body>
    <div id="stage">
      <div id="left">
        <div id="brand">
          <img src="../icons/icon128.png" alt="" />
          <span id="wordmark">scrawnload</span>
        </div>
        <div id="tagline">detect &middot; preview &middot; download</div>
        <p id="sub">
          Finds video, audio, and HLS streams on the page you're viewing —
          decrypted and merged into a single file right in your browser.
        </p>
      </div>
      <div id="right">
        <div id="popup-anchor">
          <header>
            <div class="brand">
              <img src="../icons/icon48.png" alt="" width="18" height="18" />
              <span class="wordmark">scrawnload<span class="cursor" aria-hidden="true"></span></span>
            </div>
            <span class="header-count" id="count">5 items</span>
          </header>
          <div id="ack" class="ack" hidden>
            <span>only download media you have the rights to</span>
            <button id="ack-dismiss" class="ack-dismiss" type="button">got it</button>
          </div>
          <div id="list" class="list" role="list"></div>
          <footer>local-only &middot; no data leaves this tab</footer>
        </div>
      </div>
    </div>

    <script>
      const FAKE_ITEMS = [
        { url: "https://interactive-examples.mdn.mozilla.net/media/cc0-videos/flower.mp4", kind: "file", source: "dom", title: "flower" },
        { url: "https://interactive-examples.mdn.mozilla.net/media/cc0-videos/flower.webm", kind: "file", source: "network", title: "flower" },
        { url: "https://test-streams.mux.dev/x36xhzz/x36xhzz.m3u8", kind: "stream", source: "dom", title: "big buck bunny" },
        { url: "https://playertest.longtailvideo.com/adaptive/oceans_aes/oceans_aes.m3u8", kind: "stream", source: "network", title: "oceans aes" },
        { url: "https://example.com/manifest.mpd", kind: "stream", source: "dom", title: "dash sample" },
      ];

      window.chrome = {
        tabs: { query: () => Promise.resolve([{ id: 1 }]) },
        storage: {
          session: { onChanged: { addListener: () => {} } },
          local: { get: (_k, cb) => cb({ "ack-v1": true }), set: () => {} },
        },
        runtime: {
          sendMessage: (msg, cb) => {
            if (msg.type === "GET_DETECTED") return cb({ items: FAKE_ITEMS });
            if (msg.type === "GET_JOBS") return cb({ jobs: [] });
          },
        },
      };
    </script>
    <script src="../vendor/hls.min.js"></script>
    <script src="../lib/m3u8.js"></script>
    <script src="../popup.js"></script>
  </body>
</html>

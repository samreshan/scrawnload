<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Scrawnload small promo tile rig</title>
    <style>
      * { box-sizing: border-box; }
      html, body {
        margin: 0;
        width: 440px;
        height: 280px;
        overflow: hidden;
        background: #ffffff;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }
      #card {
        width: 440px;
        height: 280px;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 14px;
      }
      #brand {
        display: flex;
        align-items: center;
        gap: 12px;
      }
      #brand img { width: 56px; height: 56px; }
      #wordmark {
        font-family: ui-monospace, "SF Mono", "Cascadia Code", Menlo, Consolas, monospace;
        font-size: 32px;
        font-weight: 700;
        letter-spacing: -0.01em;
        color: #161616;
      }
      #tagline {
        font-family: ui-monospace, "SF Mono", "Cascadia Code", Menlo, Consolas, monospace;
        font-size: 14px;
        color: #585858;
        letter-spacing: 0.01em;
      }
    </style>
  </head>
  <body>
    <div id="card">
      <div id="brand">
        <img src="../icons/icon128.png" alt="" />
        <span id="wordmark">scrawnload</span>
      </div>
      <div id="tagline">detect &middot; preview &middot; download</div>
    </div>
  </body>
</html>
